services:
  - type: web
    name: routeguard-eld
    runtime: docker
    plan: free
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: routeguard-eld-db
          property: connectionString

databases:
  - name: routeguard-eld-db
    plan: free
